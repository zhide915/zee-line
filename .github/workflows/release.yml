name: release

# Tag a release to trigger: `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release and upload binaries

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0' # fully static binary, no libc dependency
        run: |
          ext=""; [ "$GOOS" = windows ] && ext=.exe
          go build -trimpath -ldflags="-s -w" -o "zee-line${ext}" .
          name="zee-line-${GOOS}-${GOARCH}"
          if [ "$GOOS" = windows ]; then
            zip "${name}.zip" "zee-line${ext}"
            echo "ASSET=${name}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${name}.tar.gz" "zee-line${ext}"
            echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
